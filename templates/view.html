{% extends "layout.html" %}

{% block title %}
View
{% endblock %}

{% block main %}
<style>
    table {
        width: 100%;
        border-collapse: collapse;
    }

    td,
    th {
        border: 1px solid #cccccc;
        padding: 8px;
        text-align: left;
    }
</style>

<h1>View files in-browser:</h1>
<br>

{% for file in files %}
<a href="{{ url_for('view', filename=file) }}">{{ file }}</a>
{% endfor %}


{% endblock %}
